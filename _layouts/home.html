---
layout: default
---

<div class="home-hero">
  <h1 class="hero-title">{{ site.title }}</h1>
  <p class="hero-subtitle">{{ site.description }}</p>
</div>

<div class="doc-groups-grid">
  {% assign groups = site.pages | where_exp: "p", "p.group_index == true" | sort: "nav_order" %}
  {% for group in groups %}
    <a class="doc-group-card" href="{{ group.url | relative_url }}">
      <div class="card-icon">{{ group.icon | default: "📁" }}</div>
      <h2 class="card-title">{{ group.title }}</h2>
      <p class="card-desc">{{ group.description }}</p>
    </a>
  {% endfor %}
</div>

{{ content }}
